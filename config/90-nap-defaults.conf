# =============================================================================
# /etc/alsa/alsa.conf.d/90-nap-defaults.conf
#
# Kernel-level ALSA defaults applied before any user or application config.
# Loaded automatically by libasound2 when placed in /etc/alsa/alsa.conf.d/.
#
# Purpose
# -------
# 1.  Lock the hardware to a fixed sample rate at driver load time so the
#     hardware ring-buffer geometry is predictable from the first open().
# 2.  Prevent the driver from silently falling back to the onboard bcm2835
#     audio when the external DAC is unavailable.
# 3.  Ensure the "default" PCM and CTL always point to card 0 (the DAC),
#     not to whatever ALSA enumerates last.
#
# This file has no effect when /etc/asound.conf is present and already
# defines pcm.!default / ctl.!default  – those definitions take precedence.
# It serves as a safety net for applications that bypass asound.conf.
# =============================================================================

# Default card binding  (failsafe; overridden by asound.conf)
defaults.ctl.card     0
defaults.pcm.card     0
defaults.pcm.device   0
defaults.pcm.subdevice -1   # -1 = let ALSA pick the first free subdevice

# Resampler quality for any plug PCM that does not specify one explicitly.
# "speexrate_best" → 128-tap FIR; negligible CPU on Pi 4, inaudible artefacts.
defaults.pcm.rate_converter  "speexrate_best"

# dmix defaults (used by any application that opens "default" concurrently).
# These match the nap_mpd slave so the geometry is consistent whether
# applications use our named PCM or the implicit default.
defaults.pcm.dmix.rate          44100
defaults.pcm.dmix.format        S32_LE
defaults.pcm.dmix.period_size   1024
defaults.pcm.dmix.buffer_size   8192
defaults.pcm.dmix.periods       8
defaults.pcm.dmix.ipc_key       1867
defaults.pcm.dmix.ipc_perm      0660   # audio group read/write
