# =============================================================================
# /etc/mpd.conf  –  MPD configuration for NAP
#
# Audio output uses the custom ALSA PCM "nap_mpd" defined in /etc/asound.conf.
# Key decisions are explained in-line.
# =============================================================================

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
music_directory     "/var/lib/mpd/music"
playlist_directory  "/var/lib/mpd/playlists"
db_file             "/var/lib/mpd/database"
log_file            "/var/log/mpd/mpd.log"
pid_file            "/run/mpd/pid"
state_file          "/var/lib/mpd/state"
sticker_file        "/var/lib/mpd/sticker.sqlite"

# ---------------------------------------------------------------------------
# Networking
# ---------------------------------------------------------------------------
bind_to_address     "127.0.0.1"
port                "6600"

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_level           "notice"    # verbose / notice / warning – use "verbose"
                                # only for debugging; it floods the journal

# ---------------------------------------------------------------------------
# Permissions
# ---------------------------------------------------------------------------
user                "mpd"

# ---------------------------------------------------------------------------
# Input / buffer
# ---------------------------------------------------------------------------

# How many kilobytes of the decoded audio stream to keep in RAM.
# A larger buffer means more pre-fetching from the network and fewer
# mid-stream dropouts when the radio server stutters.
#   128 KiB  → ~0.7 s  at 44100 Hz / 16-bit stereo (~1 411 kbps FLAC)
#   512 KiB  → ~2.9 s  (comfortable for internet radio with 500 ms jitter)
# We use 512 because web radio streams can have bursty network conditions.
audio_buffer_size   "512"           # KiB

# Decoded audio is pre-filled up to this percentage before playback starts.
# 20% of 512 KiB keeps the initial mute gap short (~580 ms) while ensuring
# the ring-buffer has a head-start before the DAC demands its first period.
buffer_before_play  "20%"

# ---------------------------------------------------------------------------
# Resampling  (soxr – better than ALSA plug/speex above the DAC)
# ---------------------------------------------------------------------------
# MPD resamples before writing to ALSA so the hardware always receives
# exactly the rate configured in the output section below (44100 Hz).
# soxr "very high" uses a 256-tap FIR filter; CPU cost on Pi 4 is negligible.
resampler {
    plugin          "soxr"
    quality         "very high"
    # ThreadCount=1 keeps priority inversion risk low; the Pi 4 is fast enough
    threads         "1"
}

# ---------------------------------------------------------------------------
# Audio output  –  writes to the ALSA PCM "nap_mpd" (see /etc/asound.conf)
# ---------------------------------------------------------------------------
audio_output {
    type            "alsa"
    name            "NAP DAC"
    device          "nap_mpd"       # custom PCM with softvol + dmix

    # Sample rate sent to ALSA.  Must match the rate configured inside
    # the dmix slave in asound.conf (44100).  When the source track is
    # 48 kHz, MPD's soxr resampler converts it here rather than letting
    # ALSA's plug PCM do it transparently (soxr > speexrate).
    sample_rate     "44100"

    # 32-bit output: full dynamic range is preserved through the softvol
    # control.  The DAC ignores the extra bits if it is only 24-bit capable.
    format          "44100:32:2"    # rate:bits:channels

    # ALSA period and buffer sizes.  These must be ≤ the values in asound.conf.
    # Setting them explicitly here prevents MPD from auto-negotiating
    # a different geometry than asound.conf expects.
    #
    # period_size: single write quantum.  1024 frames = 4 096 bytes @ 32-bit
    #              stereo.  Interrupt frequency: 44100/1024 ≈ 43 Hz.
    period_size     "1024"

    # buffer_size: hardware ring-buffer depth.  8× period gives 8 periods
    #              of headroom before an underrun.
    buffer_size     "8192"

    # Mixer: use the softvol control defined in asound.conf ("PCM" on card 0).
    # This is the only volume control in the chain; hardware mixer is bypassed.
    mixer_type      "software"

    # Do NOT auto-resample inside ALSA; MPD's soxr is already doing it.
    replay_gain_handler "software"
    replay_gain_mode    "track"     # track | album | auto; "auto" uses album
                                    # gain when playing contiguous albums
}

# ---------------------------------------------------------------------------
# Normalization / replay gain
# ---------------------------------------------------------------------------
# ReplayGain prevents jarring loudness jumps between tracks.
# "track" mode normalises each song independently – preferable for radio.
# If your FLAC files carry ReplayGain tags, MPD reads them directly.
volume_normalization    "no"    # ReplayGain is preferable; do not double-normalise

# ---------------------------------------------------------------------------
# Filesystem
# ---------------------------------------------------------------------------
# Caches playlists in RAM; speeds up large playlist loads, harmless otherwise.
max_playlist_length     "16384"
max_output_buffer_size  "8192"  # KiB – ring-buffer cap for output plugin

# Follow symlinks inside music_directory (useful for NFS / bind mounts)
follow_outside_symlinks "yes"
follow_inside_symlinks  "yes"
