// =============================================================================
// /etc/shairport-sync.conf  –  NAP AirPlay receiver configuration
//
// shairport-sync uses its own ALSA access path (nap_airplay in asound.conf).
// The primary tuning goal here is minimal latency while being robust against
// Wi-Fi jitter – AirPlay carries ~2 000 ms of buffering from the iOS sender,
// so the local ALSA buffer only needs to absorb DMA scheduling noise.
// =============================================================================

general = {
    name            = "NAP";               // Bonjour/mDNS name as seen by Apple devices
    interpolation   = "soxr";             // "basic" | "soxr"
                                           // soxr uses a sinc-FIR resampler for the
                                           // drift-correction micro-resampling that
                                           // AirPlay requires to stay clock-locked
                                           // to the sender.  CPU cost on Pi 4: <5%.
    output_backend  = "alsa";

    // AirPlay 1 transport is always 44100 Hz / 16-bit / stereo.
    // Do not attempt to up-sample; send the native stream directly.
    // (AirPlay 2 can carry 48 kHz – if you add AP2 support, update
    //  nap_airplay in asound.conf accordingly.)
    ignore_volume_control = "no";          // honour sender volume changes
    volume_range_db = 60;                  // maps sender 0-100% range to -60…0 dBFS

    // How much clock drift correction is allowed before shairport-sync
    // re-syncs the stream.  1 000 ppm = 0.1% – tight enough to avoid
    // audible pitch wobble, loose enough to accommodate cheap sender clocks.
    resync_threshold_in_seconds = 0.050;  // 50 ms drift triggers a resync

    // Timeouts
    audio_backend_silent_lead_in_time   = "auto"; // pre-roll silence before stream starts
    wait_for_completion                 = "no";   // non-blocking teardown
    allow_session_interrupt             = "yes";  // new sender can hijack the session
};


alsa = {
    output_device       = "nap_airplay";   // custom PCM in /etc/asound.conf

    // Period and buffer sizes match those in the nap_airplay PCM definition:
    //   period_size =  512 frames  (~11.6 ms @ 44.1 kHz)
    //   buffer_size = 2048 frames  (~46.4 ms @ 44.1 kHz)
    //
    // The small buffer is intentional: shairport-sync already carries a ~2 s
    // network jitter buffer upstream.  A large ALSA buffer would only add
    // latency without improving reliability.
    period_size         = 512;
    buffer_size         = 2048;

    // Disable ALSA-level mixer control: volume is handled by the sender
    // (and by the softvol layer in nap_mpd when MPD is active; AirPlay
    // has its own sender-side volume control via allow_session_interrupt).
    mixer_control_name  = "";              // empty → no ALSA mixer manipulation

    // Use blocking ALSA writes.  Non-blocking writes require a retry loop
    // that wastes CPU and adds latency variance.
    use_mmap            = "no";            // mmap is faster but less portable
    disable_standby_mode = "auto";        // release hw when stream pauses
};


// ---------------------------------------------------------------------------
// Session management
// ---------------------------------------------------------------------------
sessioncontrol = {
    // Run the NAP source-switch helper when AirPlay starts and stops.
    // This is a belt-and-suspenders mechanism: the systemd target isolation
    // handles the actual switching, but these hooks let the LCD update
    // immediately on airplay event.
    //
    // Replace the true stubs with:
    //   run_this_before_play  = "/opt/nap/scripts/airplay_start.sh";
    //   run_this_after_end    = "/opt/nap/scripts/airplay_stop.sh";
    run_this_before_play  = "/bin/true";
    run_this_after_end    = "/bin/true";

    // Do not allow a sender to set the Pi's system volume via DACP.
    // Volume is managed by the NAP softvol control instead.
    allow_session_interrupt = "yes";
};


// ---------------------------------------------------------------------------
// Diagnostics  (comment out in production)
// ---------------------------------------------------------------------------
diagnostics = {
    log_verbosity           = 1;           // 0=silent, 1=error/warn, 2=info, 3=debug
    statistics              = "no";        // set to "yes" to log timing stats to journal
    // Uncomment the line below to write a raw PCM copy of every stream:
    // audio_file            = "/tmp/nap_airplay_debug.raw";
};
