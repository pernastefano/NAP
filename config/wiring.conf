; =============================================================================
; NAP – Hardware Wiring Schema
; Raspberry Pi 4 Model B
;
; Pin numbering: BCM (Broadcom GPIO numbers), matching hardware_input.py
; Header positions: physical 40-pin header numbers shown in [brackets]
;
; Pull-up/down strategy
; =====================
; All digital inputs use the Pi's INTERNAL pull-up resistors (PUD_UP, ~50 kΩ).
;
; Rationale:
;   1. Active-LOW wiring (button pin to GND when pressed) is the standard for
;      momentary switches because:
;        • Short-circuit risk is zero: pressing only connects the pin to GND.
;        • Logic level at rest is HIGH (3.3 V via pull-up) → clear idle state.
;        • Avoids external resistors on every button pin.
;   2. External resistors are only added where the internal 50 kΩ is too weak:
;        • Rotary encoder A/B channels benefit from an external 10 kΩ + 100 nF
;          RC filter on each line to suppress contact bounce at the hardware
;          level (complement to software debounce in _EncoderTracker).
;   3. Pull-DOWN (PUD_DOWN) is NOT used for any input because we use
;      active-LOW wiring throughout.  PUD_DOWN would require active-HIGH
;      wiring (button to 3.3 V), which risks pin damage on accidental short
;      to ground.
;
; 3.3 V vs 5 V:
;   ALL signals are 3.3 V.  The Pi's GPIO pins are NOT 5 V tolerant.
;   IR receiver modules are available in 3.3 V variants; if using a 5 V
;   module add a 1 kΩ series resistor + 3.3 V zener clamp on the data line.
; =============================================================================


; =============================================================================
; SECTION 1 – 40-Pin Header Reference (BCM ↔ Physical)
; =============================================================================
;
;   Physical  BCM   Function            Used by NAP
;   ────────  ────  ──────────────────  ──────────────────────────────
;      1      –     3.3 V power         All 3.3 V devices
;      2      –     5 V power           LCD backlight (via PCF8574)
;      3      2     SDA1 (I2C)          LCD I2C SDA
;      5      3     SCL1 (I2C)          LCD I2C SCL
;      6      –     GND                 Common ground
;      7      4     GPCLK0              ← free
;     11     17     GPIO17              Encoder A
;     13     27     GPIO27              Encoder button
;     14      –     GND                 Button GND rail
;     15     22     GPIO22              Power button
;     16     23     GPIO23              Action button 1 (play/pause)  [optional]
;     18     24     GPIO24              Action button 2 (next)        [optional]
;     22     25     GPIO25              Action button 3 (previous)    [optional]
;     24     8      SPI CE0             ← free
;     26     7      SPI CE1             ← free
;     36     16     GPIO16              IR receiver data
;     38     20     GPIO20              ← free
;     40     21     GPIO21              ← free
;
;   Encoder B (GPIO18 = PCM_CLK / physical pin 12) – note: also used by
;   I2S audio.  If your DAC uses I2S, move encoder_b to GPIO23 or GPIO24
;   and update PinConfig in hardware_input.py.
;      12     18     GPIO18             Encoder B
;
; =============================================================================


; =============================================================================
; SECTION 2 – GPIO Mapping Table
; =============================================================================

[gpio_pins]
; BCM  | Physical | Direction | Pull    | Device               | Signal
; ─────┼──────────┼───────────┼─────────┼──────────────────────┼──────────────
;  2   |    3     | IN (I2C)  | I2C bus | LCD PCF8574          | SDA
;  3   |    5     | IN (I2C)  | I2C bus | LCD PCF8574          | SCL
; 17   |   11     | INPUT     | PUD_UP  | Rotary encoder       | Channel A
; 18   |   12     | INPUT     | PUD_UP  | Rotary encoder       | Channel B
; 27   |   13     | INPUT     | PUD_UP  | Encoder push button  | BTN (active LOW)
; 22   |   15     | INPUT     | PUD_UP  | Power button         | BTN (active LOW)
; 23   |   16     | INPUT     | PUD_UP  | Action button 1      | play/pause
; 24   |   18     | INPUT     | PUD_UP  | Action button 2      | next
; 25   |   22     | INPUT     | PUD_UP  | Action button 3      | previous
; 16   |   36     | INPUT     | kernel  | IR receiver (evdev)  | data (LIRC)
;
; BCM 2/3 are managed by the I2C kernel driver; do not configure with GPIO.setup().
; BCM 16 (IR) is claimed by the gpio-ir overlay; do not configure in userspace.

encoder_a   = 17    ; physical 11
encoder_b   = 18    ; physical 12
encoder_btn = 27    ; physical 13
power_btn   = 22    ; physical 15
action_btn1 = 23    ; physical 16 – play/pause
action_btn2 = 24    ; physical 18 – next
action_btn3 = 25    ; physical 22 – previous
ir_data     = 16    ; physical 36 – managed by kernel gpio-ir overlay


; =============================================================================
; SECTION 3 – LCD (I2C, 16×2, PCF8574 I2C expander)
; =============================================================================

[lcd_i2c]
; The LCD module is a standard HD44780 controller wired to a PCF8574 I2C
; port expander.  Communication is entirely through the I2C bus.
;
; I2C bus:   /dev/i2c-1   (I2C1, pins SDA=GPIO2, SCL=GPIO3)
; I2C address: 0x27 (PCF8574) or 0x3F (PCF8574A) – check with: i2cdetect -y 1
; Speed:     100 kHz standard mode (sufficient; 400 kHz is optional)
;
; PCF8574 bit → HD44780 pin mapping (standard wiring):
;   P0 → RS    (Register Select: 0=command, 1=data)
;   P1 → RW    (Read/Write: tie LOW → always 0 in write-only mode)
;   P2 → EN    (Enable strobe – data latched on falling edge)
;   P3 → BL    (Backlight via transistor; 1=on, 0=off)
;   P4 → D4    (4-bit data bus MSB)
;   P5 → D5
;   P6 → D6
;   P7 → D7    (4-bit data bus LSB)
;
; Power:
;   VCC → 5 V  (pin 2 or pin 4 on Pi header)
;   GND → GND  (pin 6)
;   Backlight LED anode → 5 V via 47 Ω current-limiting resistor
;   Backlight LED cathode → PCF8574 P3 via NPN transistor (e.g. 2N2222)
;     or directly if the PCF8574 sink current (25 mA max) is sufficient
;
; Contrast pot:
;   A 10 kΩ trimmer between VCC and GND, wiper to V0 (pin 3) of the LCD.
;   Adjust until character pixels are clearly visible.
;
; Note: I2C pull-up resistors (4.7 kΩ to 3.3 V) are required on SDA and SCL.
; Most PCF8574 breakout boards include them.  Verify with an oscilloscope if
; you see I2C NACK errors.

bus      = 1        ; /dev/i2c-1
address  = 0x27     ; default PCF8574 address; 0x3F for PCF8574A
cols     = 16
rows     = 2
charmap  = A00      ; HD44780 ROM A00 (Latin + Japanese katakana)


; =============================================================================
; SECTION 4 – Rotary Encoder
; =============================================================================

[encoder]
; Standard incremental rotary encoder with quadrature output and push switch.
; Compatible parts: KY-040, PEC11R, Alps EC11, or any 2-bit Gray-code encoder.
;
; Pinout (most breakout boards):
;   CLK  → GPIO17  (encoder_a)  pin 11
;   DT   → GPIO18  (encoder_b)  pin 12
;   SW   → GPIO27  (encoder_btn) pin 13
;   +    → 3.3 V   (pin 1 or pin 17)
;   GND  → GND     (pin 14)
;
; Pull-ups: INTERNAL PUD_UP on all three pins.
;
; Recommended external RC filter (suppresses mechanical bounce at HW level):
;   Each of CLK and DT: 10 kΩ resistor in series, then 100 nF capacitor to GND
;   between the resistor and the Pi pin.  This creates an RC low-pass at
;   fc = 1 / (2π × 10kΩ × 100nF) ≈ 159 Hz, rejecting bounce spikes
;   (typically 1–10 µs pulses) while passing intentional edges (≥2 ms).
;
; The internal pull-ups are still required; the RC network does not set DC bias.
;
; Software debounce:
;   _ENCODER_DEBOUNCE_MS = 5  (hardware_input.py)
;   Tighter than button debounce (30 ms) because the encoder emits 1 step per
;   2 ms of rotation at typical human speed; a 30 ms window would eat steps.
;
; Quadrature decoding:
;   Gray-code state machine in _ENCODER_TABLE; detects CW (+1) and CCW (-1).
;   Both RISING and FALLING edges are captured (BOTH) for full-resolution
;   4× decoding per mechanical detent.

pin_a          = 17
pin_b          = 18
pin_button     = 27
pull           = PUD_UP
edge           = BOTH
debounce_ms    = 5
rc_filter      = yes   ; recommended: 10 kΩ + 100 nF on CLK and DT lines


; =============================================================================
; SECTION 5 – Buttons
; =============================================================================

[power_button]
; Momentary normally-open (NO) push button.
;
; Wiring:
;   One terminal → GPIO22  (pin 15)
;   Other terminal → GND   (pin 14 or any GND pin)
;
; Pull: INTERNAL PUD_UP → pin reads HIGH at rest, LOW when pressed.
; Edge: BOTH (falling=press, rising=release) for long-press detection.
;
; Long-press threshold: 600 ms (_LONG_PRESS_MS)
;   < 600 ms → on_power_short()  → toggle audio source (IDLE ↔ last source)
;   ≥ 600 ms → on_power_long()   → systemctl poweroff
;
; External hardware debounce (optional but recommended):
;   100 nF capacitor between GPIO22 and GND (on the PCB or button side).

pin         = 22
pull        = PUD_UP
edge        = BOTH
debounce_ms = 30
long_ms     = 600


[action_buttons]
; Momentary NO push buttons – same wiring convention as power button.
; Assign to (pin, id) pairs in PinConfig.action_buttons.
;
; Suggested assignment:
;   GPIO23 (pin 16) → "play_pause"   → POST /api/v1/playback {"action":"play"}
;   GPIO24 (pin 18) → "next"         → POST /api/v1/playback {"action":"next"}
;   GPIO25 (pin 22) → "previous"     → POST /api/v1/playback {"action":"previous"}
;
; Wiring (each):
;   One terminal → GPIOxx
;   Other terminal → GND
;
; Pull: INTERNAL PUD_UP
; Debounce: 30 ms (software, _ButtonTracker)
; External: optional 100 nF to GND

play_pause  = 23    ; physical pin 16
next        = 24    ; physical pin 18
previous    = 25    ; physical pin 22


; =============================================================================
; SECTION 6 – IR Receiver
; =============================================================================

[ir_receiver]
; TSOP4838 (or equivalent: VS1838B, TSOP31238).
; Carrier frequency: 38 kHz (NEC protocol, Samsung, RC-5, RC-6 all use 38 kHz).
;
; Module pinout (TO-92 package, facing dome):
;   Pin 1 (OUT)  → 1 kΩ resistor → GPIO16  (physical pin 36)
;                  100 nF capacitor from GPIO16 to GND (noise filter)
;   Pin 2 (GND)  → GND
;   Pin 3 (VCC)  → 100 Ω resistor → 3.3 V   (supply decoupling)
;                  100 µF electrolytic + 100 nF ceramic capacitor to GND
;                  (prevents remote pulses from coupling into power rail)
;
; 3.3 V operation:
;   TSOP4838 operates from 2.5–5.5 V.  At 3.3 V the output is 3.3 V nominal.
;   The 1 kΩ series resistor limits current if the output momentarily drives
;   above the Pi's absolute maximum 3.3 V I/O level.
;
; Kernel integration:
;   The gpio-ir overlay claims GPIO16 and presents it to LIRC / rc-core.
;   Add to /boot/config.txt (or /boot/firmware/config.txt on Bookworm):
;     dtoverlay=gpio-ir,gpio_pin=16
;   This creates /dev/lircX and /dev/input/eventX (symlinked to
;   /dev/input/ir-keys by the udev rule in 99-nap.rules).
;   Do NOT call gpio.setup(16, ...) from Python – the kernel owns this pin.
;
; Software path:
;   _IRReader reads raw evdev EV_KEY events; IR_KEY_MAP maps key codes to
;   action names (play_pause, next, prev, vol_up, vol_down, source_*).
;
; Pull: NONE from userspace – the TSOP4838 has an internal active-low output
;   with its own pull-up to VCC.  The kernel gpio-ir driver does not add
;   further pulls.

gpio_pin     = 16           ; physical pin 36; managed by gpio-ir overlay
evdev_path   = /dev/input/ir-keys   ; udev symlink
protocol     = NEC          ; most common; also RC-5/RC-6 via lirc
carrier_hz   = 38000
series_r     = 1000         ; Ω – GPIO protection
supply_cap   = 100          ; µF electrolytic on VCC pin


; =============================================================================
; SECTION 7 – /boot/firmware/config.txt additions
; =============================================================================

[boot_config]
; Add these lines to /boot/firmware/config.txt (Bookworm) or /boot/config.txt:
;
; # Enable I2C bus 1 (LCD)
; dtparam=i2c_arm=on
; dtparam=i2c_arm_baudrate=100000
;
; # Enable IR receiver on GPIO16
; dtoverlay=gpio-ir,gpio_pin=16
;
; # If using a USB DAC with UAC2 – prevent ALSA enumerating the onboard audio
; # as card 0 (comment out if your DAC is the only audio device):
; dtparam=audio=off
;
; # Optional: set I2S DAC overlay (e.g. PCM5122 / HiFiBerry DAC+)
; # dtoverlay=hifiberry-dacplus
; # dtoverlay=allo-boss-dac-pcm512x-audio


