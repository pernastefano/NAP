; Rotary encoder KY-040   |  1  | Or Alps EC11 / PEC11R
; Momentary push button   |  4  | 6×6 mm tactile or panel-mount
; TSOP4838 IR module      |  1  | 3-lead TO-92 or breakout board
; Resistor 10 kΩ          |  2  | Encoder RC filter (per channel)
; Resistor 1 kΩ           |  1  | IR data line protection
; Resistor 100 Ω          |  1  | IR VCC supply decoupling
; Capacitor 100 nF (film) |  5  | Encoder (×2), IR data (×1), buttons (×2)
