# =============================================================================
# /etc/asound.conf  –  System-wide ALSA configuration for NAP
#
# Strategy
# --------
# All audio sources (MPD, shairport-sync, bluealsa-aplay, Plexamp) output to
# the same physical DAC.  Because only ONE source is ever active at a time
# (enforced by systemd targets + the audio lock), we do NOT use dmix or
# pulseaudio.  Mixing introduces resampling and latency; we avoid both by
# giving each source a direct, exclusive path to the hardware.
#
# Sample-rate strategy
# --------------------
# The Raspberry Pi's built-in headphone jack (bcm2835) is limited to 48 kHz
# and has poor quality.  We assume a USB or I2S DAC that natively supports
# 44100 Hz and 48000 Hz without internal resampling.
#
#   • Native playback is always preferred (rate = source rate)
#   • If the hardware only accepts one rate (e.g. 44100) resampling is done
#     by the high-quality "speexrate_best" converter once, in software, before
#     the samples reach the kernel.
#   • 16-bit and 24-bit depths are both accepted; the hw: pcm passes them
#     through without dithering.
#
# Buffer / period tuning
# ----------------------
# The hierarchy is:   period_size < buffer_size < ALSA ring-buffer
#
#   period_size = 1024 frames  (~21 ms at 48 kHz, ~23 ms at 44.1 kHz)
#       — keeps interrupt latency low without burning CPU.
#   buffer_size = 8192 frames  (~170 ms at 48 kHz)
#       — 8× the period.  Gives the kernel enough runway to survive a brief
#         preemption spike (network IRQ, SD card write) without an underrun.
#       — A 4× multiple is the minimum for glitch-free playback on a loaded
#         Pi; 8× is the practical sweet spot between latency and safety.
#
# For AirPlay (shairport-sync) and Bluetooth (bluealsa-aplay) the stream
# already carries ~2 s of network buffering upstream; the ALSA buffer only
# needs to cover DMA jitter, so we can keep it small.  Those services
# configure their own ALSA parameters below (see "nap_airplay" and
# "nap_bluetooth").
#
# Glitch reduction
# ----------------
# 1. avoid_resampling=1  –  never resample silently; fail instead, so MPD
#    knows it must convert to the hw rate rather than letting ALSA do it
#    poorly.  MPD's own resampler (soxr) is far better.
# 2. The "direct" pcm has start_threshold = period_size so playback does not
#    begin until one full period is pre-filled – prevents the first-frame
#    click.
# 3. stop_threshold is set to buffer_size to allow the kernel ring-buffer to
#    drain completely before the stream is torn down; avoids a truncated tail.
# 4. silence_threshold = 0, silence_size = 0 – we do not pad with silence;
#    sources are responsible for their own gapless behaviour.
# =============================================================================


# ---------------------------------------------------------------------------
# 1.  Hardware PCM  –  binds to card 0 device 0.
#     Adjust "card" and "device" to match your DAC
#     (check: aplay -l)
# ---------------------------------------------------------------------------
pcm.nap_hw {
    type        hw
    card        0
    device      0
    # Pass audio through without any ALSA-level conversion.
    # Sources are responsible for sending a format the hardware accepts.
    nonblock    0       # block on full buffer; prevents busy-wait CPU loops
}

ctl.nap_hw {
    type        hw
    card        0
}


# ---------------------------------------------------------------------------
# 2.  Plug PCM  –  adds format/rate conversion when the source is not
#     natively supported by the hardware.
#
#     Used by:  MPD  (via nap_mpd alias below)
#               Any source that needs transparent conversion
#
#     The converter chain is:
#       plug  →  rate (speexrate_best)  →  hw
#
#     speexrate_best gives virtually inaudible conversion artefacts; the
#     "best" variant uses a 128-tap FIR filter.
# ---------------------------------------------------------------------------
pcm.nap_plug {
    type        plug
    slave {
        pcm         "nap_hw"
        rate        -1          # -1 = accept whatever rate the hardware reports
        channels    -1          # pass-through channel count
        format      -1          # pass-through sample format
    }
    rate_converter  "speexrate_best"
}


# ---------------------------------------------------------------------------
# 3.  Tuned playback PCM  –  wraps nap_plug with explicit buffer/period
#     geometry and glitch-prevention thresholds.
#
#     Used by:  MPD  (configured in /etc/mpd.conf as device "nap_mpd")
# ---------------------------------------------------------------------------
pcm.nap_mpd {
    type        softvol
    slave {
        pcm {
            type            dmix
            ipc_key         1024
            ipc_perm        0660    # allow audio group
            slave {
                pcm         "nap_plug"
                rate        44100   # MPD's native output rate; change to 48000
                                    # if your DAC prefers it (avoid resampling)
                period_size 1024    # frames  – ~23 ms @ 44.1 kHz
                buffer_size 8192    # frames  – ~186 ms @ 44.1 kHz (8× period)
                channels    2
                format      S32_LE  # 32-bit container; hardware truncates to
                                    # its native depth without quality loss
            }
        }
    }
    # Software volume control bound to the "PCM" mixer element on card 0.
    # This lets amixer set volume even when hw mixers are absent (e.g. USB DACs).
    control {
        name    "PCM"
        card    0
    }
    min_dB  -51.0
    max_dB    0.0
    resolution 256
}


# ---------------------------------------------------------------------------
# 4.  AirPlay PCM  –  lower buffer, no softvol
#
#     shairport-sync buffers ~2 000 ms of audio in userspace before sending
#     it here.  The ALSA layer only needs to absorb DMA scheduling jitter
#     (~10 ms worst-case on a loaded Pi).  A large ALSA buffer would add
#     unnecessary latency on top of the already-present network buffer.
#
#     period_size =  512 frames  (~10 ms @ 48 kHz)
#     buffer_size = 2048 frames  (~42 ms @ 48 kHz)  — 4× period
# ---------------------------------------------------------------------------
pcm.nap_airplay {
    type        plug
    slave {
        pcm {
            type            hw
            card            0
            device          0
            nonblock        0
        }
        rate        44100   # shairport-sync always outputs 44.1 kHz (AirPort spec)
        channels    2
        format      S16_LE  # AirPlay 1 is always 16-bit; S16_LE = zero-copy
        period_size  512
        buffer_size 2048
    }
    rate_converter  "speexrate_best"
}


# ---------------------------------------------------------------------------
# 5.  Bluetooth PCM  –  adaptive buffer for A2DP jitter
#
#     A2DP delivers audio in bursts due to Bluetooth scheduling.  The ALSA
#     buffer must be large enough to absorb a full Bluetooth slot gap
#     (~20 ms for SBC, ~30 ms for AAC at typical MTUs).
#
#     We use a slightly larger period/buffer than MPD to give bluealsa-aplay
#     headroom but still keep latency well under 200 ms.
#
#     period_size = 2048 frames  (~42 ms @ 48 kHz)
#     buffer_size = 8192 frames  (~170 ms @ 48 kHz)  — 4× period
# ---------------------------------------------------------------------------
pcm.nap_bluetooth {
    type        plug
    slave {
        pcm {
            type            hw
            card            0
            device          0
            nonblock        0
        }
        rate        48000   # bluealsa resamples A2DP SBC to 48 kHz by default
        channels    2
        format      S16_LE
        period_size 2048
        buffer_size 8192
    }
    rate_converter  "speexrate_best"
}


# ---------------------------------------------------------------------------
# 6.  Default PCM  –  fallback for applications that open "default"
#
#     Points to nap_plug so any ad-hoc test tone or aplay command uses the
#     correct converter chain.  Does NOT interfere with the exclusive-access
#     sources above.
# ---------------------------------------------------------------------------
pcm.!default {
    type    plug
    slave {
        pcm     "nap_hw"
    }
    rate_converter  "speexrate_best"
}

ctl.!default {
    type    hw
    card    0
}


# ---------------------------------------------------------------------------
# 7.  Global ALSA options
# ---------------------------------------------------------------------------
defaults.pcm.card     0
defaults.ctl.card     0

# Use the high-quality Speex resampler globally (affects plug PCMs)
defaults.pcm.rate_converter     "speexrate_best"

# Disable automatic resampling when the hardware rate and the stream rate
# differ by less than 5 ppm (prevents unnecessary CPU use for near-identical
# rates like 44100 vs 44099.96 seen with some USB clocks).
defaults.pcm.dmix.rate          44100
defaults.pcm.dmix.format        S32_LE
